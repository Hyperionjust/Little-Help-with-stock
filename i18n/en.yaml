# English UI strings (bilingual decision §9.2).
version: "1.0"
lang: en

report:
  disclaimer: >-
    This report was generated by {issuer} using public data and programmatic analysis;
    every figure traces to a data source or the model. It is for data analysis and
    presentation only and does NOT constitute investment advice. Model outputs are
    assumption-based scenario estimates, not price forecasts. Items marked "user" are
    subjective assumptions requiring manual verification. Investors should exercise
    independent judgement and bear their own investment risk.
  source_line: "Sources: {price_src} (quotes) · {fin_src} (financials)"
  gen_date: "Generated"
  issuer_default: "Internal research (personal use)"

sections:
  fundamentals: Fundamentals at a Glance
  financial_history: Financial History
  projection: Five-Year Projection
  dcf: DCF Valuation
  scenario: Scenarios & Market-Implied Expectations
  sensitivity: Sensitivity
  assumptions: Assumptions & Per-Share Sensitivity
  pharma: Pharma Pipeline Valuation

env:
  desktop_only: >-
    This tool requires the Claude desktop app — it installs Python packages and fetches
    live market data, which the web version can't do.

labels:
  source_type:
    hard: hard data
    benchmark: industry benchmark
    user_assumption: needs verification
